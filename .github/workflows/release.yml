name: release

on:
  push:
    tags:
      - "*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  DOCKERHUB_IMAGE: overvenus/corplink
  GHCR_IMAGE: ghcr.io/${{ github.repository_owner }}/corplink-headless

jobs:
  docker-image:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.DOCKERHUB_IMAGE }}
            ${{ env.GHCR_IMAGE }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  runtime-bundles:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch:
          - amd64
          - arm64
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build release tarball
        run: |
          mkdir -p dist
          bash ./scripts/package_runtime.sh \
            "${{ matrix.arch }}" \
            "dist/corplink-headless-runtime-linux-${{ matrix.arch }}.tar.gz"
        env:
          VERSION: ${{ github.ref_name }}

      - name: Upload runtime tarball
        uses: actions/upload-artifact@v4
        with:
          name: runtime-${{ matrix.arch }}
          path: dist/corplink-headless-runtime-linux-${{ matrix.arch }}.tar.gz

  github-release:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    needs:
      - runtime-bundles
    steps:
      - name: Download runtime tarballs
        uses: actions/download-artifact@v4
        with:
          pattern: runtime-*
          merge-multiple: true
          path: dist

      - name: Generate checksums
        run: |
          (cd dist && sha256sum ./*.tar.gz > corplink-headless-runtime-sha256sum.txt)

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          overwrite_files: true
          files: |
            dist/*.tar.gz
            dist/corplink-headless-runtime-sha256sum.txt
